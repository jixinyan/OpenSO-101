name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static checks that do NOT need a GPU or Isaac Sim. These run on every
  # push and on every PR. The full sim-side test suite is intentionally
  # left out of GitHub-hosted runners (Isaac Sim requires a CUDA GPU);
  # run those locally per `docs/guides/install.md`.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}

      # Install a minimal subset — no Isaac Sim, no Isaac Lab. Just enough
      # for the import smoke + unit tests to load.
      - name: Install CPU-only deps
        run: |
          python -m pip install --upgrade pip
          # Skip the heavy sim deps; install only what the framework code
          # actually imports without isaaclab in sys.path. 'pip install torch'
          # resolves a CPU build on the ubuntu runner, which is all the
          # torch-pure tests (e.g. the shaping-reward primitives) need.
          python -m pip install numpy matplotlib tensorboard prettytable packaging h5py huggingface_hub pytest torch

      - name: Verify package layout
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); import openso101; print('openso101', openso101.__version__)"

      - name: Run CPU-pure test suite (no Isaac Sim, no LeRobot)
        # The package isn't pip-installed in this minimal job; put src/ on the
        # path so `import openso101` resolves at test collection (same as the
        # 'Verify package layout' step above).
        env:
          PYTHONPATH: src
        run: |
          # The explicit list below is every test file that PASSES (or skips
          # cleanly) using ONLY the CI deps + torch — i.e. files that do not
          # import isaaclab / isaaclab_tasks / lerobot at module load. A bare
          # 'pytest tests/' is intentionally avoided: the GPU-gated files
          # would error at collection on a runner without Isaac Sim.
          #
          # Excluded because the whole module is gated behind a top-level
          # 'pytest.importorskip("isaaclab")' (collects zero tests without
          # Isaac Sim): test_register_task, test_env_base_configure,
          # test_cli_envs.
          python -m pytest \
            tests/test_cli_il_data_sim2real.py \
            tests/test_cli_rl.py \
            tests/test_shaping_rewards.py \
            tests/test_lerobot_so101_mapping.py \
            tests/test_lerobot_so101_interface.py \
            tests/test_lerobot_recorder.py \
            tests/test_hdf5_teleop_recorder.py \
            tests/test_lerobot_push_dataset.py \
            tests/test_teleop_agent_keyboard.py \
            tests/test_teleop_success.py \
            tests/test_camera_viewports.py \
            tests/test_so101_object_physics.py \
            tests/test_il_public_api.py \
            tests/test_visual_dr.py \
            -v --no-header

      - name: Ruff lint (advisory)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src/ tests/ --select=E,F --ignore=E501

  # Quick sanity check that pyproject.toml is parseable and the package
  # builds a wheel cleanly.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          # A failed build must FAIL the job: no '|| true' masking, and the
          # wheel must actually exist afterwards. The wheel builds from the
          # pyproject [project] table alone (setup.py was removed). Build in an
          # isolated env (the default) so PEP517 provisions the declared
          # build-system requires (setuptools>=61 + wheel) — the runner's base
          # env has setuptools but not wheel, so --no-isolation would fail.
          python -m build --wheel
          ls -la dist/
          test -n "$(ls dist/*.whl 2>/dev/null)"
